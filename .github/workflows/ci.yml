name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: weathercast
          POSTGRES_PASSWORD: weathercast
          POSTGRES_DB: weathercast_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U weathercast -d weathercast_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.28
      - run: bun install --frozen-lockfile
      - run: uv sync --project radar --locked
      - run: bun run check
        env:
          POSTGRES_TEST_URL: postgres://weathercast:weathercast@127.0.0.1:5432/weathercast_test
      - run: bunx expo-doctor
      - run: bun run export
      - run: docker build --file Dockerfile.radar --tag weathercast-radar:ci .
